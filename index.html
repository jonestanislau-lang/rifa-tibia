<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Shadow Roulette - Rifa</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>emailjs.init("SUA_EMAILJS_PUBLIC_KEY");</script>

<style>

/* COVER IMAGE */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:
    linear-gradient(135deg, rgba(15,23,42,0.9), rgba(2,6,23,0.95)),
    url('sandbox:/mnt/data/d0e7f0b0-afd5-465d-a7bd-dcbbeb73a946.png') no-repeat center center/cover;
  z-index:-1;
}
body{margin:0;font-family:Arial;background:#020617;color:white}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin:10px 0;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
.num{padding:10px;border-radius:6px;text-align:center;cursor:pointer;font-size:12px}
.available{background:#1e293b}
.pending{background:#f59e0b}
.sold{background:#22c55e}
.selected{outline:2px solid white}
button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  filter:brightness(1.1);
  box-shadow:0 0 10px rgba(251,191,36,0.5);
}
.admin-box{background:#111827;padding:15px;border-radius:10px;margin-top:20px}
.progress{background:#1e293b;border-radius:10px;overflow:hidden}
.progress-bar{height:10px;background:#22c55e}
img{max-width:100%;border-radius:10px;margin-bottom:8px}
.notif{background:#1f2937;padding:8px;border-radius:6px;margin:4px 0}
</style>
</head>
<body>
<div class="container">
<div style="width:100%;overflow:hidden;border-radius:14px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.5)">
<img src="sandbox:/mnt/data/d0e7f0b0-afd5-465d-a7bd-dcbbeb73a946.png" style="width:100%;display:block;object-fit:cover;max-height:260px;">
</div>
<h1 style="text-align:center;color:#fbbf24;text-shadow:0 0 10px rgba(251,191,36,0.7)">🎟 Shadow Roulette</h1>

<div id="login">
<input id="username" placeholder="Seu nome">
<button onclick="loginUser()">Entrar</button>
</div>

<div>
<input id="adminEmail" placeholder="Email admin">
<input id="adminPass" placeholder="Senha admin" type="password">
<button onclick="loginAdmin()">Admin Login</button>
</div>

<div id="app" style="display:none;">
<h2 id="welcome"></h2>
<div id="catalog"></div>
<div id="raffle" style="display:none;">
<h2 id="charName"></h2>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<p id="progressText"></p>
<div class="grid" id="grid"></div>
<button onclick="reservar()">Reservar</button>
<div id="pixBox" style="display:none; margin-top:10px; padding:10px; background:#0f172a; border-radius:8px;">
  <strong>Chave PIX:</strong>
  <div id="pixKey" style="font-size:18px; margin:5px 0;">10940400618</div>
  <button onclick="copyPix()">Copiar PIX</button>
  <p id="pixMsg" style="margin-top:10px; font-weight:bold;"></p>
  <button onclick="confirmPayment()">Já paguei</button>
</div>
  <button onclick="copyPix()">Copiar PIX</button>
</div>
<button onclick="voltar()">Voltar</button>
</div>
</div>

<div id="adminPanel" style="display:none;" class="admin-box">
<h2>👑 Admin Dashboard</h2>
<h3>Notificações</h3>
<div id="notifications"></div>
<h3>Gerenciar Personagens</h3>
<div id="charAdmin"></div>
<h4>Adicionar / Editar Personagem</h4>
<input id="charId" placeholder="ID único">
<input id="charNameInput" placeholder="Nome">
<input id="charPriceInput" placeholder="Preço">
<input id="charTotalNumbers" placeholder="Quantidade">
<input id="charImage" placeholder="URL imagem">
<button onclick="saveChar()">Salvar</button>
<hr>
<h3>Status</h3>
<p id="stats"></p>
<button onclick="aprovarTodos()">Aprovar Pendentes</button>
</div>
</div>

<script>
const firebaseConfig={apiKey:"SUA_API_KEY",authDomain:"SEU_DOMINIO",projectId:"SEU_PROJECT_ID"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let user="",selected=null,currentChar=null,chars=[];

if(Notification&&Notification.permission!=="granted")Notification.requestPermission();
function pushNotification(m){if(Notification.permission==="granted")new Notification(m);}
function emailAdmin(m){emailjs.send("SERVICE_ID","TEMPLATE_ID",{message:m});}

function loadNotifications(){
 db.collection("notifications").orderBy("time","desc").limit(20).onSnapshot(s=>{
  const box=document.getElementById("notifications");box.innerHTML="";
  s.forEach(d=>{
    const n=d.data();
    box.innerHTML+="<div class='notif'>"+n.user+" reservou "+n.number+" ("+n.char+") <button onclick=\"aprovarFromNotification('"+n.char+"',"+n.number+",'"+d.id+"')\">Aprovar</button></div>";
  });
 });
}

function loadChars(){
 db.collection("chars").onSnapshot(s=>{
  chars=[];const adminDiv=document.getElementById("charAdmin");if(adminDiv)adminDiv.innerHTML="";
  s.forEach(doc=>{
    const c=doc.data();c.id=doc.id;chars.push(c);
    if(adminDiv)adminDiv.innerHTML+="🧙 "+c.name+" - $"+c.price+" ("+(c.totalNumbers||50)+") <button onclick=\"editChar('"+c.id+"','"+c.name+"',"+c.price+","+(c.totalNumbers||50)+",'"+(c.image||"")+"')\">Editar</button><br>";
  });
  loadCatalog();
 });
}
loadChars();

function loginUser(){
 user=document.getElementById("username").value;
 if(!user)return alert("Digite seu nome");
 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("welcome").innerText="Bem-vindo, "+user;
}

function loginAdmin(){
 const email=document.getElementById("adminEmail").value;
 const pass=document.getElementById("adminPass").value;
 auth.signInWithEmailAndPassword(email,pass).then(()=>{
  document.getElementById("adminPanel").style.display="block";
  document.getElementById("app").style.display="none";
  loadStats();loadNotifications();
 }).catch(()=>alert("Login admin inválido"));
}

function loadCatalog(){
 const div=document.getElementById("catalog");div.innerHTML="";
 chars.forEach(c=>{
  div.innerHTML+="<div class='card' onclick=\"openRaffle("+JSON.stringify(c).replace(/"/g,'&quot;')+")\">"+(c.image?"<img src='"+c.image+"'>":"")+"<strong>"+c.name+"</strong><br>$"+c.price+"</div>";
 });
}

function openRaffle(c){currentChar=c;document.getElementById("catalog").style.display="none";document.getElementById("raffle").style.display="block";document.getElementById("charName").innerText=c.name;loadGrid();}

function loadGrid(){
 db.collection("rifas").doc(currentChar.id).onSnapshot(doc=>{
  const data=doc.data()||{numbers:{}};const numbers=data.numbers;const grid=document.getElementById("grid");grid.innerHTML="";
  let sold=0,total=0;const max=currentChar.totalNumbers||50;
  for(let i=0;i<=max;i++){total++;let div=document.createElement("div");div.className="num";
    if(numbers[i]){
      const info=numbers[i];
      if(info.status==="pending"&&Date.now()-info.time>600000){delete numbers[i];db.collection("rifas").doc(currentChar.id).set({numbers},{merge:true});}
      else{div.innerText=i+"\n"+info.user;if(info.status==="pending"){div.classList.add("pending");if(auth.currentUser){let b=document.createElement("button");b.innerText="✔";b.onclick=()=>aprovarIndividual(i);div.appendChild(b);}}else{div.classList.add("sold");sold++;}}
    }else{div.innerText=i;div.classList.add("available");div.onclick=()=>{document.querySelectorAll(".num").forEach(n=>n.classList.remove("selected"));div.classList.add("selected");selected=i;};}
    grid.appendChild(div);
  }
  document.getElementById("progressBar").style.width=(sold/total*100)+"%";
  document.getElementById("progressText").innerText=sold+"/"+total+" vendidos";
 });
}

function reservar(){
 if(selected===null) return alert("Escolha um número");
 const ref=db.collection("rifas").doc(currentChar.id);

 db.runTransaction(async tx=>{
  const doc=await tx.get(ref);
  let numbers=doc.exists?doc.data().numbers||{}:{};
  if(numbers[selected]) throw new Error("Número ocupado");
  numbers[selected]={user,status:"pending",time:Date.now()};
  db.collection("notifications").add({char:currentChar.id,number:selected,user,time:Date.now()});
  tx.set(ref,{numbers},{merge:true});
 })
 .then(()=>{
   selected=null;
   document.getElementById("pixBox").style.display="block";
   var msg = "Você reservou o número " + selected + " no valor de $" + currentChar.price + ".
Envie o PIX e depois clique em 'Já paguei'.";
   document.getElementById("pixMsg").innerText = msg;
   alert(msg);
 })
 .catch(e=>alert(e.message));
}:{};
  if(numbers[selected])throw new Error("Número ocupado");
  numbers[selected]={user,status:"pending",time:Date.now()};
  db.collection("notifications").add({char:currentChar.id,number:selected,user,time:Date.now()});
  tx.set(ref,{numbers},{merge:true});
 }).then(()=>{pushNotification("Nova reserva feita");emailAdmin("Nova reserva feita");selected=null;}).catch(e=>alert(e.message));
}

function aprovarTodos(){const ref=db.collection("rifas").doc(currentChar.id);ref.get().then(doc=>{let n=doc.data().numbers;for(let k in n)if(n[k].status==="pending")n[k].status="paid";ref.set({numbers:n});loadStats();});}
function aprovarIndividual(i){const ref=db.collection("rifas").doc(currentChar.id);ref.get().then(doc=>{let n=doc.data().numbers;if(n[i]){n[i].status="paid";ref.set({numbers:n},{merge:true});loadStats();}});}
function aprovarFromNotification(charId,num,notifId){const ref=db.collection("rifas").doc(charId);ref.get().then(doc=>{let data=doc.data().numbers;if(data[num]){data[num].status="paid";ref.set({numbers:data},{merge:true}).then(()=>{db.collection("notifications").doc(notifId).delete();loadStats();});}});}
function loadStats(){let s=0,m=0;chars.forEach(c=>{db.collection("rifas").doc(c.id).get().then(d=>{let n=d.data()?.numbers||{};for(let k in n)if(n[k].status==="paid"){s++;m+=c.price;}document.getElementById("stats").innerText="Vendidos:"+s+" | Lucro:$"+m;});});}
function voltar(){document.getElementById("raffle").style.display="none";document.getElementById("catalog").style.display="block";}
function saveChar(){const id=charId.value,name=charNameInput.value,price=parseInt(charPriceInput.value),total=parseInt(charTotalNumbers.value),img=charImage.value;db.collection("chars").doc(id).set({name,price,totalNumbers:total||50,image:img||""},{merge:true});}
function editChar(id,n,p,t,i){
 charId.value=id;
 charNameInput.value=n;
 charPriceInput.value=p;
 charTotalNumbers.value=t;
 charImage.value=i;
}

function copyPix(){
 const pix = document.getElementById("pixKey").innerText;
 navigator.clipboard.writeText(pix).then(()=>{
   alert("PIX copiado: "+pix);
 });
}

function confirmPayment(){
  if(selected===null){
    alert("Selecione um número primeiro.");
    return;
  }
  db.collection("notifications").add({
    type:"paid_notice",
    char: currentChar.id,
    number: selected,
    user: user,
    amount: currentChar.price,
    time: Date.now()
  }).then(()=>{
    alert("Admin notificado sobre seu pagamento!");
  });
});
}
</script>
</body>
</html>
